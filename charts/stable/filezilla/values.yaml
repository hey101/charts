image:
  repository: ghcr.io/linuxserver/filezilla
  tag: 3.68.1@sha256:1e3f3cbae4ff9c6508f3e0c7ed3be1c8537bc92683c99ad6c81f730824023bc3
  pullPolicy: IfNotPresent

securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsUser: 0
    runAsGroup: 0

workload:
  main:
    podSpec:
      containers:
        main:
          securityContext:

service:
  main:
    ports:
      main:
        port: 10035
        protocol: http
        targetPort: 3000

persistence:
  config:
    enabled: true
    mountPath: "/config"
  varrun:
    enabled: false

portal:
  open:
    enabled: true
