image:
  repository: docker.io/duplicati/duplicati
  tag: latest@sha256:a7e0251f80b351e3f709ff3eb7fde0dd27892c7083d469caad4f9a55e42cde50
  pullPolicy: IfNotPresent
service:
  main:
    ports:
      main:
        port: 8200
        targetPort: 8200
workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              type: http
              path: /
            readiness:
              type: http
              path: /
            startup:
              type: http
              path: /
          env: {}
persistence:
  config:
    enabled: true
    mountPath: /data
portal:
  open:
    enabled: true
