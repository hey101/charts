image:
  pullPolicy: IfNotPresent
  repository: plexripper/plexripper
  tag: 0.27.0@sha256:1fd0c8e8dfbc5a711a8519444c1cf228b505381daae530731ce1ac08ed09a54f
service:
  main:
    ports:
      main:
        protocol: http
        targetPort: 7000
        port: 7000
workload:
  main:
    podSpec:
      containers:
        main:
          probes:
            liveness:
              enabled: true
              type: http
            readiness:
              enabled: true
              type: http
            startup:
              enabled: true
              type: http
persistence:
  config:
    enabled: true
    mountPath: /Config
  downloads:
    enabled: true
    mountPath: /Downloads
portal:
  open:
    enabled: true
