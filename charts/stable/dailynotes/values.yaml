image:
  pullPolicy: IfNotPresent
  repository: docker.io/m0ngr31/dailynotes
  tag: latest@sha256:92e539389250ddfcd3aa53b5ccdafd1a6f728e8e65ab15d82bcbce3fb6e49d26
persistence:
  config:
    enabled: true
    mountPath: /app/config
portal:
  open:
    enabled: true
securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsGroup: 0
    runAsUser: 0
service:
  main:
    ports:
      main:
        port: 5000
        protocol: tcp
        targetPort: 5000
workload:
  main:
    podSpec:
      containers:
        main:
          env:
            PREVENT_SIGNUPS: ""
