image:
  repository: docker.io/foxxmd/multi-scrobbler
  tag: latest@sha256:9a0abdb85bd179e5b4bd811027d066a79c3786f9988bd919ae6457983c1a1823
  pullPolicy: IfNotPresent

securityContext:
  container:
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    runAsGroup: 0
    runAsUser: 0

service:
  main:
    ports:
      main:
        port: 9078
        targetPort: 9078

persistence:
  config:
    enabled: true
    mountPath: /config

portal:
  open:
    enabled: true
