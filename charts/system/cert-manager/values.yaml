image:
  repository: tccr.io/tccr/scratch
  pullPolicy: IfNotPresent
  tag: latest@sha256:5510f75577ea4509cfc4739c5e6a40b6a719837c406467e69c9b15df7250b78b

service:
  main:
    enabled: false
    ports:
      main:
        enabled: false

workload:
  main:
    enabled: false

portal:
  open:
    enabled: false

operator:
  register: true

configmap:
  dashboard:
    enabled: true
    labels:
      grafana_dashboard: "1"
    data:
      cert-manager.json: >-
        {{ .Files.Get "dashboard.json" | indent 8 }}

certmanager:
  dns01RecursiveNameservers: "1.1.1.1:53,1.0.0.1:53"
  dns01RecursiveNameserversOnly: false
  installCRDs: true
  enableCertificateOwnerRef: true
  prometheus:
    enabled: true
    servicemonitor:
      enabled: true
